# Copy this file to aoi.yaml and edit before running the pipeline.
# This config is read by src/data_acquisition and every downstream module.

project:
  name: "UHIMP-Delhi-Pilot"
  gee_project_id: "your-gee-project-id"

aoi:
  # Option A: bounding box [min_lon, min_lat, max_lon, max_lat]
  bbox: [76.84, 28.40, 77.35, 28.88]
  # Option B: use an admin boundary instead (leave bbox null if using this)
  admin_boundary:
    source: "FAO/GAUL/2015/level2"
    field: "ADM2_NAME"
    value: "Delhi"

time:
  start_date: "2024-05-01"
  end_date: "2024-06-15"
  season_label: "pre_monsoon_2024"

resolution:
  grid_resolution_m: 30
  crs: "EPSG:4326"

data_sources:
  landsat8:
    collection: "LANDSAT/LC08/C02/T1_L2"
    max_cloud_cover_pct: 30
  ecostress:
    enabled: true
  sentinel2:
    collection: "COPERNICUS/S2_SR_HARMONIZED"
    max_cloud_cover_pct: 20
  era5:
    collection: "ECMWF/ERA5_LAND/HOURLY"
  cpcb:
    enabled: true
    station_ids: []   # fill in relevant station IDs for the AOI
  osm:
    enabled: true
  ghsl:
    enabled: true
  ut_globus:
    enabled: false     # set true if building-level data available for this city

heat_classification:
  method: "percentile"     # "percentile" or "stddev"
  thresholds:
    low_max: 0.30
    moderate_max: 0.60
    high_max: 0.90
    # anything above high_max => "severe"

modeling:
  baseline_model: "xgboost"
  physics_informed:
    enabled: true
    energy_balance_loss_weight: 0.3
  train_test_split:
    method: "spatial"       # avoid spatial leakage
    test_fraction: 0.2
    random_seed: 42

optimization:
  algorithm: "genetic_algorithm"   # or "simulated_annealing"
  budget_constraint: null           # e.g. 1000000000 (INR), null = unconstrained
  max_generations: 200
  population_size: 100
